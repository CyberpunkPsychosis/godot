name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  GODOT_VERSION: 4.4.1-stable

jobs:
  godot-validate:
    name: Godot headless validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/godot-bin
          key: godot-${{ env.GODOT_VERSION }}-linux-x86_64

      - name: Download Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot-bin
          curl -fsSL -o /tmp/godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d ~/godot-bin

      - name: Validate project (import + headless checks)
        run: |
          export GODOT_BIN="$HOME/godot-bin/Godot_v${GODOT_VERSION}_linux.x86_64"
          bash scripts/ci_validate.sh

      - name: Generate command docs
        run: |
          export GODOT_BIN="$HOME/godot-bin/Godot_v${GODOT_VERSION}_linux.x86_64"
          "$GODOT_BIN" --headless --path project --script res://tests/tools/gen_command_docs.gd

      - name: Upload command docs
        uses: actions/upload-artifact@v4
        with:
          name: COMMANDS.md
          path: project/addons/ai_console/docs/COMMANDS.md

  injector-test:
    name: Addon injector script (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inject addon into project.godot variants (idempotent)
        shell: pwsh
        run: |
          $cases = @(
            "config_version=5`n`n[application]`n`nconfig/name=`"NoSection`"`n",
            "config_version=5`n`n[editor_plugins]`n",
            "config_version=5`n`n[editor_plugins]`n`nenabled=PackedStringArray(`"res://addons/other/plugin.cfg`")`n"
          )
          $i = 0
          foreach ($case in $cases) {
            $i++
            $proj = Join-Path $env:RUNNER_TEMP "proj$i"
            New-Item -ItemType Directory -Force -Path $proj | Out-Null
            Set-Content -Path (Join-Path $proj "project.godot") -Value $case -NoNewline
            ./packaging/tools/add_ai_to_project.ps1 -Project $proj -AddonSource ./project/addons/ai_console
            ./packaging/tools/add_ai_to_project.ps1 -Project $proj -AddonSource ./project/addons/ai_console
            if (-not (Test-Path (Join-Path $proj "addons/ai_console/plugin.gd"))) { throw "case ${i}: addon not copied" }
            $cfg = Get-Content (Join-Path $proj "project.godot") -Raw
            $count = ([regex]::Matches($cfg, [regex]::Escape("res://addons/ai_console/plugin.cfg"))).Count
            if ($count -ne 1) { throw "case ${i}: expected exactly 1 plugin entry, got ${count}:`n$cfg" }
            if ($i -eq 3 -and $cfg -notmatch "res://addons/other/plugin.cfg") { throw "case 3: pre-existing plugin entry was lost" }
            Write-Host "case $i OK"
          }

  bridge-test:
    name: Bridge unit + e2e tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bridge/package-lock.json
      - run: npm ci
        working-directory: bridge
      - run: npm test
        working-directory: bridge
